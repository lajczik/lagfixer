EntityLimiter:
  enabled: true
  worlds: # Use '*' to enable for all worlds.
    - '*'
  values:
    # list of entities that will not be removed: https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/entity/EntityType.html
    whitelist:
      - VILLAGER
      - ZOMBIE_VILLAGER
      - ENDER_DRAGON
      - WITHER
      - WOLF
      - CAT

    # If "true" the limit won't apply to entities from ModelEngine or MythicMobs
    ignore_models: true
    # Animals and monsters per chunk (-1 to disable).
    creatures: 15
    # Dropped items per chunk (-1 to disable).
    items: -1
    # Minecarts and boats per chunk (-1 to disable).
    vehicles: 3
    # Projectiles per chunk (-1 to disable).
    projectiles: 5

    # Spawn reasons: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/event/entity/CreatureSpawnEvent.SpawnReason.html
    reasons:
      - DEFAULT
      - EGG
      - NATURAL
      - SPAWNER
      - SPAWNER_EGG
      - COMMAND

    # The overflow purge limits the number of entities per chunk, removing excess ones to prevent server lag caused by players trying to overload chunks.
    overflow_purge:
      enabled: false
      # An interval in seconds that defines how often the excess entities in a chunk will be removed (per cycle)
      interval: 30
      # Limit multiplier to not remove too many mobs
      limit_multiplier: 1.5
      types:
        creatures: true
        items: false
        vehicles: true
        projectiles: true
        # If "false" overflow purge won't remove entities with a custom name
        named: false