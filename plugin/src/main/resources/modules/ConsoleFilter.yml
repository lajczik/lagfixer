ConsoleFilter:
  enabled: true
  worlds: [ ]
  values:
    logs_limit: 100 # Maximum logs saved in "/logs" directory. Use -1 to disable.
    filter:
      enabled: false
      save_filtered: true
      error_filtering: false
      patterns:
        # Filters chat messages.
        - '^<(([A-Za-z0-9_]{3,16}))> (.{0,})'

        # Filters "lost connection" messages.
        - '^/([0-9]{1,3})\.([0-9]{1,3})\.([0-9]{1,3})\.([0-9]{1,3})\:([0-9]{1,5}) lost connection'

        # Filters "Reached End of Stream" messages.
        - 'Reached end of stream for /([0-9]{1,3})\.([0-9]{1,3})\.([0-9]{1,3})\.([0-9]{1,3})$'

        # Filters "Player issued server command" messages (useful for hiding sensitive data like passwords).
        - '([A-Za-z0-9_]{3,16}) issued server command: /(.{0,})'

        # Filters "Read timed out" messages.
        - 'Read timed out'

        # Filters login messages.
        - '^.*logged in with entity id ([0-9]{0,}) at.*$'

        # Filters player disconnect messages.
        - '([A-Za-z0-9_]{3,16}) lost connection: Disconnected'

        # Filters messages like "§ePLAYER left the game."
        - '^(§e)([A-Za-z0-9_]{3,16}) left the game.'

        # Filters "Connection reset" messages.
        - 'Connection reset'

        # Filters console force-saving messages.
        - 'CONSOLE: Forcing save\.\..*'

        # Filters console save-completion messages.
        - 'CONSOLE: Save complete\..*'